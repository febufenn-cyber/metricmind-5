name: phase-1-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: metricmind
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metricmind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_ADMIN_URL: postgres://postgres:postgres@127.0.0.1:5432/metricmind
      TEST_DATABASE_READER_URL: postgres://metricmind_reader:metricmind_reader@127.0.0.1:5432/metricmind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run validation
        id: validation
        continue-on-error: true
        run: |
          set -o pipefail
          npm run validate 2>&1 | tee validation.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-output
          path: validation.log
          retention-days: 1
      - name: Fail when validation failed
        if: steps.validation.outcome != 'success'
        run: exit 1
