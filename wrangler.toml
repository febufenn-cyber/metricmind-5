name = "metricmind-api"
main = "src/app-worker.js"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[vars]
ORGANIZATION_TIMEZONE = "Asia/Kolkata"
ANALYTICS_SCHEMA = "analytics"
ANALYTICS_TABLE = "product_events"

# Create the binding with:
# npx wrangler hyperdrive create metricmind-analytics \
#   --connection-string="$METRICMIND_READER_DATABASE_URL" \
#   --binding=HYPERDRIVE \
#   --caching-disabled \
#   --update-config
#
# Wrangler will append:
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<generated-hyperdrive-id>"
